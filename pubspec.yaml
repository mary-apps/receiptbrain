name: receiptbrain
description: "Premium receipt scanner with expense dashboard"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # Core
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  
  # Storage
  hive_flutter: ^1.1.0
  
  # UI
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  fl_chart: ^0.71.0
  lucide_icons: ^0.257.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Camera/Scanner
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
